  for = "/privacy.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/terms.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/contact.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/sitemap.html"
  [headers.values]
